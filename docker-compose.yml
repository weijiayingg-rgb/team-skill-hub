version: '3.8'

services:
  server:
    image: node:18-alpine
    working_dir: /app/server
    command: node index.js
    ports:
      - '3001:3001'
    environment:
      PORT: 3001
      DB_PATH: /app/data/skillhub.db
      REGISTRY_PATH: /app/data/skillhub-registry
      UPLOAD_DIR: /app/data/uploads
    volumes:
      - ./:/app
      - skillhub-data:/app/server/data
    restart: unless-stopped

  web:
    image: node:18-alpine
    working_dir: /app/web
    command: node_modules/.bin/vite --host 0.0.0.0
    ports:
      - '5173:5173'
    volumes:
      - ./:/app
    depends_on:
      - server
    environment:
      VITE_API_URL: http://server:3001/api

volumes:
  skillhub-data:
